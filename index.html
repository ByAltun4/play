<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-black text-white">

<div id="app">

<!-- STORE -->
<div v-if="view=='store'" class="p-4">

<div class="grid grid-cols-3 gap-4">
<div v-for="a in apps" class="bg-gray-800 p-3 rounded cursor-pointer" @click="openApp(a)">
<img :src="a.icon" class="w-16">
<p>{{a.name}}</p>
</div>
</div>

</div>

<!-- DETAIL -->
<div v-if="view=='detail'" class="p-4">

<button @click="view='store'">← Geri</button>

<h1 class="text-2xl">{{selected.name}}</h1>
<img :src="selected.icon" class="w-20">

<p>{{selected.desc}}</p>

<p>İndirme: {{selected.downloads}}</p>
<p>Görüntülenme: {{selected.views}}</p>

<button @click="download(selected)" class="bg-green-500 px-3 py-1">İndir</button>

<!-- COMMENT -->
<h2 class="mt-4">Yorumlar</h2>

<div v-for="c in appComments">
<p>{{c.text}}</p>
</div>

<input v-model="comment" placeholder="Yorum yaz">
<button @click="sendComment">Gönder</button>

</div>

</div>

<script>
const {createApp,ref,computed,onMounted}=Vue;

createApp({
setup(){

const API="https://byaltunstore.byaltun4.workers.dev";

const view=ref("store");
const apps=ref([]);
const selected=ref(null);
const comments=ref([]);
const comment=ref("");

const sync=async()=>{
const r=await fetch(API+"/sync");
const d=await r.json();
apps.value=d.apps;
comments.value=d.comments;
};

const openApp=async(a)=>{
selected.value=a;
view.value="detail";

await fetch(API+"/view",{method:"POST",body:JSON.stringify({id:a.id})});
};

const download=async(a)=>{
await fetch(API+"/download",{method:"POST",body:JSON.stringify({id:a.id})});
window.open(a.apkUrl);
};

const sendComment=async()=>{
await fetch(API+"/comment",{method:"POST",body:JSON.stringify({
appId:selected.value.id,
text:comment.value
})});
comment.value="";
sync();
};

const appComments=computed(()=>comments.value.filter(c=>c.appId==selected.value?.id));

onMounted(sync);

return{apps,view,selected,openApp,download,comments,comment,sendComment,appComments};
}
}).mount("#app");
</script>

</body>
</html>
