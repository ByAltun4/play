<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ücretsiz APK indir | BYALTUN</title>

<meta name="description" content="En iyi ücretsiz APK indir, mod apk, oyunlar ve uygulamalar burada.">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-black text-white">

<div id="app">

<!-- HEADER -->
<div class="p-4 flex justify-between">
<h1>BYALTUN APK</h1>
<input v-model="search" placeholder="APK ara..." class="text-black">
</div>

<!-- APPS -->
<div class="grid grid-cols-2 md:grid-cols-6 gap-3 p-4">
<div v-for="a in filtered" class="bg-gray-800 p-3 rounded cursor-pointer" @click="open(a)">
<img :src="a.icon" class="w-14">
<p>{{a.name}}</p>
</div>
</div>

<!-- DETAIL -->
<div v-if="app" class="p-4">
<h2>{{app.name}}</h2>
<p>{{app.desc}}</p>

<button @click="download(app)" class="bg-green-500 px-3 py-1">İndir</button>

<h3>Yorumlar</h3>
<div v-for="c in appComments">{{c.text}}</div>

<input v-model="comment">
<button @click="sendComment">Gönder</button>
</div>

</div>

<script>
const {createApp,ref,computed,onMounted}=Vue;

createApp({
setup(){

const API="https://byaltunstore.byaltun4.workers.dev";

const apps=ref([]);
const comments=ref([]);
const app=ref(null);
const comment=ref("");
const search=ref("");

const sync=async()=>{
const r=await fetch(API+"/sync");
const d=await r.json();
apps.value=d.apps;
comments.value=d.comments;
};

const open=async(a)=>{
app.value=a;
await fetch(API+"/track",{method:"POST",body:JSON.stringify({id:a.id,type:"view"})});
};

const download=async(a)=>{
await fetch(API+"/track",{method:"POST",body:JSON.stringify({id:a.id,type:"download"})});
window.open(a.apkUrl);
};

const sendComment=async()=>{
await fetch(API+"/comment",{method:"POST",body:JSON.stringify({
appId:app.value.id,text:comment.value
})});
comment.value="";
sync();
};

const appComments=computed(()=>comments.value.filter(c=>c.appId==app.value?.id));

const filtered=computed(()=>apps.value.filter(a=>a.name.toLowerCase().includes(search.value.toLowerCase())));

onMounted(sync);

return{apps,app,open,download,comment,sendComment,appComments,search,filtered};
}
}).mount("#app");
</script>

</body>
</html>
