<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByAltun Store | Global APK Distribution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Outfit', sans-serif; user-select: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-btn { background: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); transition: 0.3s; }
        .neon-btn:hover { box-shadow: 0 0 40px rgba(99, 102, 241, 0.8); transform: scale(1.05); }
        [v-cloak] { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app" v-cloak class="min-h-screen">
        <nav class="p-6 glass-panel sticky top-0 z-50 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter text-indigo-500">BYALTUN STORE</div>
            <div class="flex gap-4">
                <button @click="showUpload = !showUpload" class="text-xs font-bold uppercase tracking-widest border border-white/10 px-6 py-2 rounded-full hover:bg-white/5">
                    {{ showUpload ? 'Geri Dön' : 'APK YÜKLE' }}
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-8">
            <div v-if="showUpload" class="max-w-2xl mx-auto glass-panel p-10 rounded-[3rem] animate-pulse-once">
                <h2 class="text-4xl font-black mb-8 italic">CONSOLE_UPLOAD</h2>
                <div class="space-y-4">
                    <input v-model="form.name" placeholder="Uygulama Adı" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 outline-none focus:border-indigo-500">
                    <input v-model="form.icon" placeholder="İkon URL (https://...)" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 outline-none">
                    <input v-model="form.apkUrl" placeholder="APK İndirme Linki" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 outline-none">
                    <textarea v-model="form.desc" placeholder="Kısa Açıklama..." class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 h-32 outline-none"></textarea>
                    <button @click="submitToWorker" class="w-full neon-btn py-5 rounded-2xl font-black uppercase tracking-widest">İNCELEMEYE GÖNDER</button>
                </div>
            </div>

            <div v-else>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div v-for="app in apps" :key="app.id" class="glass-panel p-8 rounded-[2.5rem] hover:border-indigo-500/50 transition duration-500 group">
                        <img :src="app.icon" class="w-24 h-24 rounded-3xl mb-6 shadow-2xl group-hover:rotate-6 transition">
                        <h3 class="text-3xl font-black mb-2">{{ app.name }}</h3>
                        <p class="text-xs opacity-40 mb-8 leading-relaxed">{{ app.desc }}</p>
                        <div class="flex justify-between items-center border-t border-white/5 pt-6">
                            <span class="text-[10px] font-bold opacity-30 uppercase">{{ app.date }}</span>
                            <a :href="app.apkUrl" class="bg-indigo-600 px-8 py-3 rounded-2xl font-black text-xs">YÜKLE</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- %100 GÜVENLİK PROTOKOLLERİ ---
        // 1. F12, Ctrl+Shift+I, Ctrl+U Engelleme
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                window.location.href = "https://www.google.com"; // Saldıranı dışarı at
                return false;
            }
        };

        // 2. Anti-Debugger (Kod incelenirse sonsuz döngüye girer)
        setInterval(function() { (function() { return false; }["constructor"]("debugger")["call"]()); }, 50);

        // --- VUE INTERFACE ---
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const WORKER_URL = "https://byaltunstore.byaltun4.workers.dev";
                const apps = ref([]);
                const showUpload = ref(false);
                const form = ref({ name: '', icon: '', apkUrl: '', desc: '' });

                const getApps = async () => {
                    try {
                        const res = await fetch(`${WORKER_URL}/get-apps`);
                        apps.value = await res.json();
                    } catch (e) { console.error("Safe Mode Active"); }
                };

                const submitToWorker = async () => {
                    if(!form.value.name || !form.value.apkUrl) return alert("Eksik bilgi!");
                    await fetch(`${WORKER_URL}/submit`, {
                        method: 'POST',
                        body: JSON.stringify(form.value)
                    });
                    alert("Uygulamanız alındı. Hasan Altunufağı onayından sonra yayınlanacaktır.");
                    form.value = { name: '', icon: '', apkUrl: '', desc: '' };
                    showUpload.value = false;
                };

                onMounted(getApps);
                return { apps, showUpload, form, submitToWorker };
            }
        }).mount('#app');
    </script>
</body>
</html>
