<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByAltun Store | App Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .app-card { transition: transform 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .app-card:hover { transform: translateY(-8px); border-color: #6366f1; }
        [v-cloak] { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app" v-cloak class="min-h-screen">
    
    <nav class="p-5 glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-layer-group"></i>
                </div>
                <h1 class="font-extrabold text-xl tracking-tighter uppercase">BYALTUN <span class="text-indigo-500">Store</span></h1>
            </div>
            <div class="flex gap-4">
                <button @click="view = 'store'" class="text-xs font-bold uppercase tracking-widest px-4 hover:text-indigo-400">Mağaza</button>
                <button @click="view = 'upload'" class="bg-indigo-600 px-6 py-2 rounded-xl text-xs font-bold hover:bg-indigo-500 transition">YAYINLA</button>
            </div>
        </div>
    </nav>

    <main v-if="view == 'store'" class="max-w-7xl mx-auto p-8">
        <div class="mb-12">
            <h2 class="text-6xl font-black italic tracking-tighter mb-2">PROJELERİM</h2>
            <div class="h-1 w-24 bg-indigo-600"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="app in publicApps" :key="app.id" class="app-card glass p-8 rounded-[2rem] flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <img :src="app.icon || 'https://via.placeholder.com/150'" class="w-20 h-20 rounded-2xl bg-slate-800">
                        <span v-if="app.isBoosted" class="bg-amber-500 text-black px-3 py-1 rounded-lg text-[9px] font-black uppercase">Premium</span>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">{{ app.name }}</h3>
                    <p class="text-sm opacity-40 mb-8 line-clamp-2">{{ app.desc }}</p>
                </div>
                <div class="flex justify-between items-center pt-6 border-t border-white/5">
                    <span class="text-[10px] font-bold opacity-30 uppercase">{{ app.devName }}</span>
                    <a :href="app.apkUrl" target="_blank" class="bg-white text-black px-8 py-3 rounded-xl font-bold text-xs hover:bg-indigo-500 hover:text-white transition">YÜKLE</a>
                </div>
            </div>
        </div>
    </main>

    <main v-if="view == 'upload'" class="max-w-2xl mx-auto p-10 glass rounded-[2.5rem] my-10">
        <h2 class="text-3xl font-black mb-8 italic">YENİ UYGULAMA GÖNDER</h2>
        <div class="space-y-4">
            <input v-model="form.name" placeholder="Uygulama Adı" class="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none focus:border-indigo-500">
            <input v-model="form.icon" placeholder="İkon URL" class="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none">
            <input v-model="form.apkUrl" placeholder="APK Linki" class="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none">
            <input v-model="form.devName" placeholder="Geliştirici" class="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none">
            <textarea v-model="form.desc" placeholder="Uygulama açıklaması..." class="w-full bg-slate-900 p-4 rounded-xl border border-white/5 h-32 outline-none"></textarea>
            <button @click="submitApp" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/20">İNCELEMEYE GÖNDER</button>
        </div>
    </main>

    <main v-if="view == 'admin'" class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10 pb-6 border-b border-white/10">
            <h2 class="text-4xl font-black italic">PANEL <span class="text-indigo-500">BYALTUN</span></h2>
            <button @click="saveAdminChanges" class="bg-emerald-600 px-10 py-3 rounded-xl font-bold text-white hover:bg-emerald-500 transition">KAYDET VE YAYINLA</button>
        </div>

        <div class="space-y-4">
            <div v-for="app in adminApps" :key="app.id" class="glass p-6 rounded-2xl flex items-center gap-6">
                <img :src="app.icon" class="w-16 h-16 rounded-xl bg-slate-800">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 flex-1">
                    <input v-model="app.name" class="bg-slate-900 p-3 rounded-lg border border-white/5 text-xs">
                    <input v-model="app.devName" class="bg-slate-900 p-3 rounded-lg border border-white/5 text-xs">
                    <select v-model="app.status" class="bg-slate-900 p-3 rounded-lg border border-white/5 text-xs">
                        <option value="pending">BEKLEMEDE</option>
                        <option value="approved">ONAYLI</option>
                    </select>
                    <div class="flex gap-2">
                        <button @click="app.isBoosted = !app.isBoosted" :class="app.isBoosted?'bg-amber-500 text-black':'bg-white/5 text-white'" class="flex-1 rounded-lg text-[10px] font-bold uppercase">Öne Çıkar</button>
                        <button @click="deleteApp(app.id)" class="bg-red-600 text-white p-3 rounded-lg hover:bg-red-700 transition"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
            <button @click="addProject" class="w-full p-8 border-2 border-dashed border-indigo-500/30 rounded-2xl opacity-50 hover:opacity-100 transition font-bold uppercase tracking-widest">
                <i class="fas fa-plus mr-2"></i> Manuel Proje/APK Ekle
            </button>
        </div>
    </main>

    <footer class="p-20 text-center">
        <p @click="adminEntry" class="text-[10px] opacity-10 tracking-[10px] uppercase cursor-pointer hover:opacity-100 transition duration-1000">Dev/ByAltun</p>
    </footer>

</div>

<script>
const { createApp, ref, onMounted, computed } = Vue;

createApp({
    setup() {
        const WORKER_URL = "https://byaltunstore.byaltun4.workers.dev";
        const view = ref('store');
        const adminKey = ref('');
        const apps = ref([]);
        const adminApps = ref([]);
        const form = ref({ name: '', icon: '', apkUrl: '', devName: '', desc: '' });

        const sync = async () => {
            try {
                const res = await fetch(`${WORKER_URL}/sync`);
                const data = await res.json();
                apps.value = data.apps || [];
            } catch (e) { console.warn("Sunucu bağlantısı kurulamadı."); }
        };

        const adminEntry = async () => {
            const pass = prompt("ROOT_ACCESS:");
            if (pass === "ByAltunAdmin123!") {
                adminKey.value = pass;
                view.value = 'admin';
                const res = await fetch(`${WORKER_URL}/admin-all`, { headers: { "X-Admin-Key": pass } });
                adminApps.value = await res.json();
            }
        };

        const saveAdminChanges = async () => {
            await fetch(`${WORKER_URL}/admin-save`, {
                method: 'POST',
                headers: { "X-Admin-Key": adminKey.value, "Content-Type": "application/json" },
                body: JSON.stringify({ apps: adminApps.value })
            });
            alert("Tüm değişiklikler başarıyla kaydedildi!");
            sync();
            view.value = 'store';
        };

        const deleteApp = (id) => {
            if(confirm("Bu uygulamayı silmek istediğine emin misin?")) {
                adminApps.value = adminApps.value.filter(a => a.id !== id);
            }
        };

        const addProject = () => {
            adminApps.value.push({ id: Date.now().toString(), name: 'Yeni Proje', devName: 'ByAltun', icon: '', apkUrl: '', desc: '', status: 'approved', isBoosted: false });
        };

        const submitApp = async () => {
            if(!form.value.name || !form.value.apkUrl) return alert("Hata: Zorunlu alanları doldurun!");
            await fetch(`${WORKER_URL}/submit`, { method: 'POST', body: JSON.stringify(form.value) });
            alert("Uygulama gönderildi. Admin onayı bekleniyor.");
            form.value = { name: '', icon: '', apkUrl: '', devName: '', desc: '' };
            view.value = 'store';
            sync();
        };

        const publicApps = computed(() => apps.value.filter(a => a.status === 'approved'));

        onMounted(sync);

        return { view, publicApps, adminApps, form, adminEntry, saveAdminChanges, deleteApp, addProject, submitApp };
    }
}).mount('#app');
</script>
</body>
</html>
