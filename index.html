<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYALTUN APK PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
body { transition: 0.3s; }
.dark { background:#020617; color:#f1f5f9; }
.light { background:#f8fafc; color:#0f172a; }
.glass { backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.1); }
</style>
</head>

<body>
<div id="app" :class="isDark?'dark':'light'" class="min-h-screen">

<!-- NAV -->
<div class="p-4 flex justify-between items-center glass">
<h1 class="font-black text-xl cursor-pointer" @click="view='store'">BYALTUN APK</h1>

<div class="flex gap-2">
<input v-model="search" placeholder="Ara..." class="px-3 py-1 rounded bg-gray-200 text-black text-sm">

<button @click="isDark=!isDark">🌙</button>

<button v-if="!user" @click="view='auth'" class="bg-green-500 text-white px-3 py-1 rounded">Giriş</button>

<button v-if="user" @click="view='upload'" class="bg-green-500 text-white px-3 py-1 rounded">Yükle</button>

<button v-if="user" @click="logout">Çıkış</button>
</div>
</div>

<!-- MENU -->
<div class="flex gap-4 p-3 text-sm">
<button @click="filter='all'">Ana Sayfa</button>
<button @click="filter='Oyun'">Oyunlar</button>
<button @click="filter='Uygulama'">Uygulamalar</button>
<button @click="sort='top'">En Çok İndirilenler</button>
<button @click="sort='choice'">ByAltun Seçimi</button>
<button @click="sort='new'">Yeni</button>
</div>

<!-- STORE -->
<div v-if="view=='store'" class="p-4">

<h2 class="text-xl font-bold mb-4">Günün Uygulamaları</h2>

<div class="grid grid-cols-2 gap-4 mb-6">
<div v-for="a in todays" class="p-4 glass rounded">
<img :src="a.icon" class="w-16 h-16">
<h3>{{a.name}}</h3>
<button @click="download(a)" class="bg-green-500 text-white px-2 py-1 mt-2">İndir</button>
</div>
</div>

<h2 class="text-xl font-bold mb-4">Tüm Uygulamalar</h2>

<div class="grid grid-cols-3 gap-4">
<div v-for="a in filtered" class="p-4 glass rounded">
<img :src="a.icon" class="w-12 h-12">
<h3>{{a.name}}</h3>
<p class="text-xs">{{a.category}}</p>
<button @click="download(a)" class="bg-green-500 text-white px-2 py-1 mt-2">İndir</button>
</div>
</div>

</div>

<!-- AUTH -->
<div v-if="view=='auth'" class="p-10 max-w-md mx-auto">
<h2 class="text-2xl mb-4">{{register?'Kayıt Ol':'Giriş Yap'}}</h2>

<input v-model="email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-200 text-black">
<input v-model="pass" type="password" placeholder="Şifre" class="w-full p-2 mb-2 bg-gray-200 text-black">

<button @click="login" class="bg-green-500 text-white w-full p-2">Gönder</button>

<p @click="register=!register" class="mt-2 cursor-pointer text-sm">
{{register?'Giriş yap':'Kayıt ol'}}
</p>
</div>

<!-- UPLOAD -->
<div v-if="view=='upload'" class="p-6 max-w-xl mx-auto">

<h2 class="text-xl mb-4">Uygulama Yükle</h2>

<input v-model="form.name" placeholder="Ad" class="w-full p-2 mb-2 bg-gray-200 text-black">

<select v-model="form.category" class="w-full p-2 mb-2 bg-gray-200 text-black">
<option>Uygulama</option>
<option>Oyun</option>
</select>

<input type="file" @change="upload($event,'icon')" class="mb-2">
<input type="file" @change="upload($event,'screen')" class="mb-2">

<input v-model="form.apk" placeholder="APK Link" class="w-full p-2 mb-2 bg-gray-200 text-black">
<input v-model="form.dev" placeholder="Geliştirici" class="w-full p-2 mb-2 bg-gray-200 text-black">

<textarea v-model="form.desc" placeholder="Açıklama" class="w-full p-2 mb-2 bg-gray-200 text-black"></textarea>

<button @click="submit" class="bg-green-500 text-white w-full p-2">Gönder</button>

</div>

<!-- ADMIN -->
<div v-if="view=='admin'" class="p-6">

<h2 class="text-xl mb-4">Admin Panel</h2>

<input v-model="announcement" placeholder="Duyuru" class="p-2 bg-gray-200 text-black">
<button @click="saveAnn" class="bg-green-500 text-white p-2">Kaydet</button>

<h3 class="mt-6">Bekleyenler</h3>

<div v-for="a in pending" class="p-4 glass mt-2">
{{a.name}}

<button @click="approve(a)">Onayla</button>
<button @click="reject(a)">Sil</button>
</div>

</div>

</div>

<script>
const {createApp,ref,computed,onMounted} = Vue;

createApp({
setup(){

const isDark=ref(true);
const view=ref('store');
const user=ref(localStorage.getItem('user'));

const search=ref('');
const filter=ref('all');
const sort=ref('new');

const apps=ref(JSON.parse(localStorage.getItem('apps')||'[]'));
const pending=ref(JSON.parse(localStorage.getItem('pending')||'[]'));

const email=ref('');
const pass=ref('');
const register=ref(false);

const form=ref({name:'',icon:'',screen:'',apk:'',dev:'',desc:'',category:'Uygulama'});

const announcement=ref(localStorage.getItem('ann')||'');

const login=()=>{
if(register.value){
localStorage.setItem(email.value,pass.value);
alert("Kayıt başarılı");
}else{
if(localStorage.getItem(email.value)==pass.value){
user.value=email.value;
localStorage.setItem('user',email.value);
view.value='store';
}else alert("Hatalı");
}
};

const logout=()=>{
localStorage.clear();
location.reload();
};

const upload=(e,type)=>{
const r=new FileReader();
r.onload=x=>form.value[type]=x.target.result;
r.readAsDataURL(e.target.files[0]);
};

const submit=()=>{
pending.value.push({...form.value,status:'pending',downloads:0});
localStorage.setItem('pending',JSON.stringify(pending.value));
alert("Onay bekleniyor");
view.value='store';
};

const approve=(a)=>{
apps.value.push({...a,status:'approved'});
pending.value=pending.value.filter(x=>x!=a);
save();
};

const reject=(a)=>{
pending.value=pending.value.filter(x=>x!=a);
save();
};

const save=()=>{
localStorage.setItem('apps',JSON.stringify(apps.value));
localStorage.setItem('pending',JSON.stringify(pending.value));
};

const saveAnn=()=>{
localStorage.setItem('ann',announcement.value);
alert("Kaydedildi");
};

const download=(a)=>{
a.downloads++;
window.open(a.apk);
save();
};

const filtered=computed(()=>{
let res=apps.value.filter(a=>{
return (filter.value=='all'||a.category==filter.value)
&& a.name.toLowerCase().includes(search.value.toLowerCase());
});

if(sort.value=='top') res.sort((a,b)=>b.downloads-a.downloads);
if(sort.value=='new') res.reverse();

return res;
});

const todays=computed(()=>apps.value.slice(0,2));

onMounted(()=>{});

return{
isDark,view,user,search,filter,sort,
apps,pending,email,pass,register,
form,login,logout,upload,submit,
approve,reject,filtered,todays,
announcement,saveAnn,download
}
}
}).mount('#app');
</script>

</body>
</html>
