<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByAltun Store | Digital App Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Syncopate:wght@700&display=swap');
        
        :root { --p: #6366f1; --bg: #03040b; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; user-select: none; }
        .font-logo { font-family: 'Syncopate', sans-serif; }

        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); border-color: var(--p); }
        
        /* 3D Logo Animasyonu */
        .logo-box { width: 45px; height: 45px; background: linear-gradient(45deg, #6366f1, #a855f7); border-radius: 12px; transform: rotate(15deg); transition: 0.5s; }
        .logo-box:hover { transform: rotate(0deg) scale(1.1); }

        /* Badge Stilleri */
        .badge-boost { background: linear-gradient(90deg, #f59e0b, #d97706); color: black; font-weight: 800; padding: 2px 10px; border-radius: 6px; font-size: 9px; }
        .badge-promo { background: #3b82f6; color: white; font-weight: 800; padding: 2px 10px; border-radius: 6px; font-size: 9px; }

        [v-cloak] { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app" v-cloak class="min-h-screen">
    
    <div v-if="announcement" class="bg-indigo-600 py-2 text-center text-[10px] font-bold tracking-[3px] uppercase">
        {{ announcement }}
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-xl z-50">
        <div class="flex items-center gap-4">
            <div class="logo-box flex items-center justify-center"><i class="fas fa-box-open text-white"></i></div>
            <h1 class="text-xl font-logo tracking-tighter text-indigo-500">BYALTUN</h1>
        </div>
        <div class="flex gap-4">
            <button @click="view = 'store'" class="text-xs font-bold px-4" :class="view=='store'?'text-indigo-500':''">STORE</button>
            <button @click="view = 'upload'" class="bg-indigo-600 px-6 py-2 rounded-full text-xs font-bold hover:scale-105 transition">YAYINLA</button>
        </div>
    </nav>

    <main v-if="view == 'store'" class="max-w-7xl mx-auto p-8 animate-fade-in">
        <header class="mb-20 text-center lg:text-left">
            <h2 class="text-5xl lg:text-8xl font-black mb-6 italic tracking-tighter">THE FUTURE<br><span class="opacity-20 italic">OF MOBILE.</span></h2>
            <div class="flex gap-2">
                <div class="h-1 w-20 bg-indigo-600 rounded-full"></div>
                <div class="h-1 w-5 bg-white/20 rounded-full"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="app in publicApps" :key="app.id" class="glass p-8 rounded-[2.5rem] group hover:neon-glow transition-all duration-500">
                <div class="flex justify-between items-start mb-8">
                    <img :src="app.icon" class="w-20 h-20 rounded-3xl shadow-2xl group-hover:rotate-6 transition duration-500">
                    <div class="flex flex-col gap-2">
                        <span v-if="app.isBoosted" class="badge-boost">ÖNE ÇIKAN</span>
                        <span v-if="app.isSponsored" class="badge-promo">SPONSORLU</span>
                    </div>
                </div>
                <h3 class="text-3xl font-black mb-3">{{ app.name }}</h3>
                <p class="text-sm opacity-40 mb-8 h-12 line-clamp-2 leading-relaxed">{{ app.desc }}</p>
                <div class="flex justify-between items-center border-t border-white/5 pt-6">
                    <span class="text-[10px] font-bold opacity-30 italic">DEV: {{ app.devName }}</span>
                    <a :href="app.apkUrl" class="bg-white text-black px-8 py-3 rounded-2xl font-black text-xs hover:bg-indigo-500 hover:text-white transition">YÜKLE</a>
                </div>
            </div>
        </div>
    </main>

    <main v-if="view == 'upload'" class="max-w-2xl mx-auto p-12 glass rounded-[3rem] mt-20 animate-slide-up">
        <h2 class="text-4xl font-black mb-10 italic">CONSOLE_UPLOAD</h2>
        <div class="space-y-4">
            <input v-model="form.name" placeholder="Uygulama Adı" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none focus:border-indigo-500">
            <input v-model="form.icon" placeholder="İkon URL" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none">
            <input v-model="form.apkUrl" placeholder="APK Linki" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none">
            <input v-model="form.devName" placeholder="Geliştirici İsmi" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none">
            <textarea v-model="form.desc" placeholder="Detaylı Açıklama..." class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 h-32 outline-none"></textarea>
            <button @click="submitApp" class="w-full bg-indigo-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:shadow-2xl transition">İncelemeye Gönder</button>
        </div>
    </main>

    <main v-if="view == 'admin'" class="max-w-[1600px] mx-auto p-12 animate-fade-in">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-5xl font-black tracking-tighter text-amber-500 font-logo italic">ROOT_PANEL</h2>
            <div class="flex gap-4">
                <input v-model="newAnn" placeholder="Duyuru Metni..." class="bg-white/5 p-3 rounded-xl border border-white/10 text-xs w-64 outline-none">
                <button @click="setAnnouncement" class="bg-indigo-600 px-6 rounded-xl text-xs font-bold">Duyuruyu Yayınla</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div v-for="app in allApps" :key="app.id" class="glass p-6 rounded-3xl border-l-4" :class="app.status=='pending'?'border-amber-500':'border-emerald-500'">
                <div class="flex gap-4 mb-6">
                    <img :src="app.icon" class="w-16 h-16 rounded-xl bg-white/5">
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <h4 class="font-bold">{{ app.name }}</h4>
                            <span class="text-[10px] opacity-40">{{ app.status.toUpperCase() }}</span>
                        </div>
                        <p class="text-[10px] opacity-40">{{ app.devName }} ({{ app.date }})</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button @click="adminAction('update_status', app.id, 'approved')" class="bg-emerald-600/20 text-emerald-400 py-2 rounded-lg text-[10px] font-bold">ONAYLA</button>
                    <button @click="adminAction('update_status', app.id, 'pending')" class="bg-amber-600/20 text-amber-400 py-2 rounded-lg text-[10px] font-bold">BEKLEMEYE AL</button>
                    <button @click="adminAction('boost', app.id)" :class="app.isBoosted?'bg-amber-500 text-black':'bg-white/5 text-white'" class="py-2 rounded-lg text-[10px] font-bold">ÖNE ÇIKAR</button>
                    <button @click="adminAction('sponsor', app.id)" :class="app.isSponsored?'bg-blue-500 text-white':'bg-white/5 text-white'" class="py-2 rounded-lg text-[10px] font-bold">SPONSOR</button>
                    <button @click="adminAction('delete', app.id)" class="col-span-2 bg-red-600/20 text-red-400 py-2 rounded-lg text-[10px] font-bold mt-2">SİSTEMDEN SİL</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-40 p-10 border-t border-white/5 text-center">
        <div class="flex justify-center gap-10 opacity-20 mb-8">
            <i class="fab fa-android text-2xl"></i>
            <i class="fab fa-apple text-2xl"></i>
            <i class="fas fa-shield-alt text-2xl"></i>
        </div>
        <p @click="triggerAdmin" class="text-[10px] opacity-10 tracking-[5px] uppercase cursor-pointer hover:opacity-100 transition duration-1000">Dev/ByAltun LABS</p>
    </footer>

</div>

<script>
// --- GÜVENLİK PROTOKOLLERİ ---
document.onkeydown = (e) => {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
        window.location.href = "https://google.com";
        return false;
    }
};

setInterval(() => {
    // (function(){debugger}()) // Debugger kapanı
}, 100);

const { createApp, ref, onMounted, computed } = Vue;

createApp({
    setup() {
        const WORKER_URL = "https://byaltunstore.byaltun4.workers.dev";
        const view = ref('store');
        const adminKey = ref('');
        const publicApps = ref([]);
        const allApps = ref([]);
        const announcement = ref('');
        const newAnn = ref('');
        const form = ref({ name: '', icon: '', apkUrl: '', devName: '', desc: '' });

        const sync = async () => {
            const res = await fetch(`${WORKER_URL}/sync`);
            const data = await res.json();
            publicApps.value = data.apps;
            announcement.value = data.announcement;
        };

        const triggerAdmin = () => {
            const pass = prompt("ROOT_ACCESS_REQUIRED:");
            if (pass == "ByAltunAdmin123!") {
                adminKey.value = pass;
                view.value = 'admin';
                adminSync();
            } else {
                alert("ACCESS_DENIED");
            }
        };

        const adminSync = async () => {
            const res = await fetch(`${WORKER_URL}/admin-sync`, { headers: { "X-Admin-Key": adminKey.value } });
            allApps.value = await res.json();
        };

        const adminAction = async (action, appId, payload = null) => {
            await fetch(`${WORKER_URL}/admin-action`, {
                method: 'POST',
                headers: { "X-Admin-Key": adminKey.value, "Content-Type": "application/json" },
                body: JSON.stringify({ action, appId, payload })
            });
            adminSync();
            sync();
        };

        const setAnnouncement = () => adminAction('set_announcement', null, newAnn.value);

        const submitApp = async () => {
            await fetch(`${WORKER_URL}/submit`, {
                method: 'POST',
                body: JSON.stringify(form.value)
            });
            alert("Uygulamanız ByAltun laboratuvarına gönderildi!");
            form.value = { name: '', icon: '', apkUrl: '', devName: '', desc: '' };
            view.value = 'store';
        };

        onMounted(sync);

        return { view, publicApps, allApps, announcement, newAnn, form, triggerAdmin, adminAction, setAnnouncement, submitApp };
    }
}).mount('#app');
</script>
</body>
</html>
